services:
  devmate-base:
    image: devmate-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile

  # MCP 服务
  mcp-server:
    container_name: devmate-mcp-server
    image: devmate-app:latest
    depends_on:
      - devmate-base
    volumes:
      - ..:/app
      - venv:/app/.venv
    ports:
      - "8000:8000"
    command: ["uv", "run", "python", "-m", "src.mcp_server.server"]

  # CLI 交互
  devmate-app:
    container_name: devmate-app
    image: devmate-app:latest
    depends_on:
      - mcp-server
    volumes:
      - ..:/app
      - venv:/app/.venv
      - ../workspace:/app/workspace
      - ../.knowledge:/app/.knowledge
    stdin_open: true
    tty: true
    command: ["uv", "run", "devmate", "chat"]

  # Web 服务
  devmate-web:
    container_name: devmate-web
    image: devmate-app:latest
    depends_on:
      - mcp-server
    volumes:
      - ..:/app
      - venv:/app/.venv
      - ../workspace:/app/workspace
      - ../.knowledge:/app/.knowledge
    ports:
      - "5003:5003"
    command: ["uv", "run", "devmate", "serve"]

#统一虚拟环境
volumes:
  venv: